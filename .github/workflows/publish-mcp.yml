name: Publish MCP Server to Registry

on:
  push:
    tags: ['mcp-v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: mcp-registry-publish
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/mcp-v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/mcp-v}"
          jq --arg v "$VERSION" '.version = $v' server.json > server.tmp && mv server.tmp server.json

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login http --domain coachwatts.com --private-key "${{ secrets.MCP_PRIVATE_KEY }}"

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
